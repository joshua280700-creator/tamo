<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores para ti 🌻❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdf6e3;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }

        #canvas-container {
            width: 100%;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 5vh;
        }

        canvas {
            background-color: transparent;
        }

        #text-container {
            width: 80%;
            max-width: 600px;
            margin-top: 20px;
            text-align: left;
            min-height: 150px;
        }

        .line {
            margin-bottom: 10px;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        #timer-container {
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            border-top: 1px solid #ccc;
            padding-top: 15px;
            width: 80%;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="treeCanvas"></canvas>
    </div>

    <div id="text-container"></div>

    <div id="timer-container">
        <div style="font-size: 0.9rem; font-weight: normal; margin-bottom: 5px;">Mi amor por ti comenzó hace...</div>
        <span id="timer">Calculando...</span>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DEL MENSAJE Y FECHA ---
        // Cambia la fecha por su aniversario
        const fechaInicio = new Date("2023-05-03T00:00:00"); 

        const mensajes = [
            "Flores amarillas para el amor de mi vida:",
            " ",
            "Si pudiera elegir un lugar seguro, sería a tu lado.",
            "Cuanto más tiempo estoy contigo, más te amo.",
            " ",
            "- I Love You! ❤️"
        ];

        // --- 2. CRONÓMETRO ---
        function actualizarTemporizador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;

            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById("timer").innerText = 
                `${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
        }
        setInterval(actualizarTemporizador, 1000);
        actualizarTemporizador();

        // --- 3. EFECTO DE MÁQUINA DE ESCRIBIR ---
        const textContainer = document.getElementById('text-container');
        let lineaActual = 0;
        let caracterActual = 0;

        function escribirTexto() {
            if (lineaActual < mensajes.length) {
                if (caracterActual === 0) {
                    const p = document.createElement('div');
                    p.className = 'line';
                    p.id = 'linea-' + lineaActual;
                    textContainer.appendChild(p);
                }

                const lineaElemento = document.getElementById('linea-' + lineaActual);
                lineaElemento.innerHTML += mensajes[lineaActual].charAt(caracterActual);
                caracterActual++;

                if (caracterActual >= mensajes[lineaActual].length) {
                    caracterActual = 0;
                    lineaActual++;
                    setTimeout(escribirTexto, 500); 
                } else {
                    setTimeout(escribirTexto, 50); 
                }
            }
        }
        // Retrasamos el inicio del texto para que el árbol crezca primero un poco
        setTimeout(escribirTexto, 1500); 

        // --- 4. ANIMACIÓN DEL ÁRBOL EN CANVAS ---
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        
        // Ajustamos el tamaño para que el árbol respire mejor
        canvas.width = 600;
        canvas.height = 400;

        function drawBranch(startX, startY, len, angle, branchWidth) {
            // Calculamos matemáticamente el punto final de esta rama específica
            const endX = startX + len * Math.sin(angle * Math.PI / 180);
            const endY = startY - len * Math.cos(angle * Math.PI / 180);

            ctx.beginPath();
            ctx.strokeStyle = '#5c4033'; 
            ctx.lineWidth = branchWidth;
            ctx.lineCap = "round";
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Condición para detener el crecimiento y dibujar el girasol
            if (len < 12) {
                ctx.font = "24px Arial";
                // Ajuste de coordenadas para centrar el emoji en la punta de la rama
                ctx.fillText("🌻", endX - 12, endY + 8);
                return;
            }

            // Animación: llamamos a la función de nuevo con un retraso para generar las sub-ramas
            setTimeout(() => {
                drawBranch(endX, endY, len * 0.75, angle + 20, branchWidth * 0.7); // Rama derecha
                drawBranch(endX, endY, len * 0.75, angle - 20, branchWidth * 0.7); // Rama izquierda
            }, 150); // <-- Puedes bajar este número (ej. 80) si quieres que crezca más rápido
        }

        // Iniciar el dibujo (X central, Y hasta abajo, largo inicial 90, ángulo 0 [hacia arriba], grosor 10)
        drawBranch(canvas.width / 2, canvas.height, 90, 0, 10);

    </script>
</body>
</html>
