<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amor 🌻🤍</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdfaf3; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        /* --- PANTALLA DE INICIO --- */
        #start-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #fdfaf3;
            z-index: 10;
        }

        #start-btn {
            width: 130px; /* Un poco más adaptado a celulares */
            cursor: pointer;
            animation: latido 1.5s infinite; 
            transition: opacity 0.5s;
        }

        #start-text {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #b08a68;
            font-weight: bold;
            animation: latido 1.5s infinite;
            text-align: center;
            padding: 0 20px;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none; 
            width: 100%;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        #canvas-container {
            width: 100%;
            /* Altura adaptativa */
            height: 55vh; 
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 2vh;
        }

        canvas {
            background-color: transparent;
            max-width: 100%; /* Evita que se desborde en celular */
        }

        #text-container {
            width: 90%;
            max-width: 650px;
            margin-top: 10px;
            text-align: left;
            min-height: 150px;
        }

        .line {
            margin-bottom: 6px;
            font-size: 1rem;
            line-height: 1.3;
        }

        #timer-container {
            margin-top: auto;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 12px;
            width: 90%;
            max-width: 650px;
            padding-bottom: 20px;
        }
        
        #timer {
            color: #b08a68; 
        }

        /* --- MEDIA QUERIES PARA CELULAR --- */
        @media (max-width: 600px) {
            .line {
                font-size: 0.9rem; /* Letra un poco más pequeña para que quepa bien */
            }
            #timer-container {
                font-size: 1rem;
            }
            #canvas-container {
                height: 50vh; /* Da más espacio al texto abajo en pantallas chicas */
            }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <img src="girasol.png" alt="Toca aquí" id="start-btn" style="display: none;">
        <div id="start-text" style="display: none;">Toca el girasol ✨</div>
        <div id="loading-text" style="color: #888; font-family: sans-serif;">Cargando sorpresa...</div>
    </div>

    <div id="main-content">
        <div id="canvas-container">
            <canvas id="treeCanvas"></canvas>
        </div>

        <div id="text-container"></div>

        <div id="timer-container">
            <div style="font-size: 0.8rem; font-weight: normal; margin-bottom: 4px; color: #777;">Mi amor por ti comenzó hace...</div>
            <span id="timer">Calculando tiempo juntos...</span>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN ---
        const fechaInicio = new Date("2024-11-26T00:00:00"); 
        
        // Agregamos tu firma como último mensaje
        const mensajes = [
            "Flores para el amor de mi vida, mi futura psicóloga favorita:",
            " ",
            "Girasoles por tu luz, y tulipanes blancos por la paz que me das.",
            "Si pudiera elegir un lugar seguro, sería siempre a tu lado.",
            "Cuanto más tiempo estoy contigo, más te amo.",
            " ",
            "Te amo mi niña hermosa ❤️",
            " ",
            "Atte: el amor de tu vida, Joshua Gamboa"
        ];

        // --- 2. PREPARACIÓN DEL LIENZO (RESPONSIVO) ---
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        
        // Detectamos si es celular o computadora para darle el tamaño correcto al árbol
        const esCelular = window.innerWidth < 600;
        canvas.width = esCelular ? window.innerWidth * 0.95 : 700;
        canvas.height = esCelular ? 450 : 550; 

        // --- 3. CARGA DE IMÁGENES E INTERACCIÓN ---
        let imagenesCargadas = 0;
        const totalImagenes = 2;

        const imgGirasol = new Image();
        imgGirasol.src = 'girasol.png'; 
        
        const imgTulipan = new Image();
        imgTulipan.src = 'tulipan_blanco.png'; 

        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const startText = document.getElementById('start-text');
        const loadingText = document.getElementById('loading-text');
        const mainContent = document.getElementById('main-content');

        function iniciarCuandoTodoCargue() {
            imagenesCargadas++;
            if (imagenesCargadas === totalImagenes) {
                loadingText.style.display = 'none';
                startBtn.style.display = 'block';
                startText.style.display = 'block';

                startBtn.addEventListener('click', () => {
                    startScreen.style.opacity = '0';
                    setTimeout(() => {
                        startScreen.style.display = 'none';
                        mainContent.style.display = 'flex';
                        setTimeout(() => {
                            mainContent.style.opacity = '1';
                            startSequence();
                        }, 100);
                    }, 500);
                });
            }
        }

        imgGirasol.onload = iniciarCuandoTodoCargue;
        imgTulipan.onload = iniciarCuandoTodoCargue;

        // --- 4. SECUENCIA DE ANIMACIÓN ---
        function startSequence() {
            dibujarCesped(); 
            actualizarTemporizador(); 
            setInterval(actualizarTemporizador, 1000);
            
            // Adaptamos el largo y grosor del tronco según la pantalla
            const largoTronco = esCelular ? 70 : 95;
            const grosorTronco = esCelular ? 9 : 12;

            setTimeout(() => {
                dibujarRama(canvas.width / 2, canvas.height - 10, largoTronco, 0, grosorTronco);
            }, 500);

            setTimeout(escribirTexto, 3500); 
        }

        // --- 5. FUNCIONES DE DIBUJO ---
        function dibujarCesped() {
            // Un poco menos de tulipanes si es celular para que no se sature la memoria
            const numeroTulipanes = esCelular ? 80 : 120; 
            const alturaSuelo = canvas.height - 20; 
            const anchoImagen = esCelular ? 16 : 20; 
            const altoImagen = esCelular ? 30 : 38;

            for (let i = 0; i < numeroTulipanes; i++) {
                const x = Math.random() * (canvas.width + 100) - 50; 
                const y = alturaSuelo - altoImagen + (Math.random() * 30);
                const escala = 0.7 + Math.random() * 0.4;
                const anguloRad = (Math.random() - 0.5) * 20 * Math.PI / 180;

                ctx.save();
                ctx.translate(x + (anchoImagen*escala)/2, y + (altoImagen*escala)/2);
                ctx.rotate(anguloRad);
                ctx.drawImage(imgTulipan, -(anchoImagen*escala)/2, -(altoImagen*escala)/2, anchoImagen * escala, altoImagen * escala);
                ctx.restore();
            }
        }

        function dibujarRama(startX, startY, len, angle, branchWidth) {
            const endX = startX + len * Math.sin(angle * Math.PI / 180);
            const endY = startY - len * Math.cos(angle * Math.PI / 180);

            ctx.beginPath();
            ctx.strokeStyle = '#5c4033'; 
            ctx.lineWidth = branchWidth;
            ctx.lineCap = "round";
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Límite de crecimiento también adaptado al celular
            const limiteCrecimiento = esCelular ? 9 : 12;

            // -- CONDICIÓN DE FLORECIMIENTO --
            if (len < limiteCrecimiento) {
                ctx.beginPath();
                ctx.fillStyle = `rgba(34, 139, 34, 0.4)`; 
                ctx.save();
                ctx.translate(endX, endY);
                for (let i = 0; i < 4; i++) {
                    ctx.rotate(45 * Math.PI / 180);
                    ctx.fillRect(-6, -6, 12, 12);
                }
                ctx.restore();

                const tamañoBase = esCelular ? 26 : 32; 
                let escalaActual = 0;
                const escalaFinal = 0.9 + Math.random() * 0.3;
                const velocidadCrecimiento = 0.04 + Math.random() * 0.02;

                function animarFlor() {
                    if (escalaActual < escalaFinal) {
                        ctx.save();
                        ctx.translate(endX, endY);
                        ctx.scale(escalaActual, escalaActual);
                        ctx.drawImage(imgGirasol, -tamañoBase / 2, -tamañoBase / 2, tamañoBase, tamañoBase);
                        ctx.restore();
                        
                        escalaActual += velocidadCrecimiento;
                        requestAnimationFrame(animarFlor);
                    }
                }
                animarFlor();
                return;
            }

            // -- CRECIMIENTO DEL ÁRBOL --
            setTimeout(() => {
                dibujarRama(endX, endY, len * 0.75, angle + 25, branchWidth * 0.65);
                dibujarRama(endX, endY, len * 0.75, angle - 25, branchWidth * 0.65);
                
                if (Math.random() > 0.15) { 
                    dibujarRama(endX, endY, len * 0.65, angle + (Math.random() - 0.5) * 15, branchWidth * 0.60);
                }
                if (Math.random() > 0.6) { 
                    dibujarRama(endX, endY, len * 0.45, angle + (Math.random() - 0.5) * 20, branchWidth * 0.50);
                }

            }, 130);
        }

        // --- 6. CRONÓMETRO Y TEXTO ---
        function actualizarTemporizador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
            document.getElementById("timer").innerText = `${dias} días ${horas} h ${minutos} m ${segundos} s`;
        }

        const textContainer = document.getElementById('text-container');
        let lineaActual = 0; caracterActual = 0;

        function escribirTexto() {
            if (lineaActual < mensajes.length) {
                if (caracterActual === 0) {
                    const p = document.createElement('div');
                    p.className = 'line';
                    p.id = 'linea-' + lineaActual;
                    
                    // Si es la última línea (tu firma), la ponemos en cursiva y a la derecha
                    if (lineaActual === mensajes.length - 1) {
                        p.style.textAlign = 'right';
                        p.style.fontStyle = 'italic';
                        p.style.marginTop = '15px';
                        p.style.color = '#b08a68'; // Mismo color del cronómetro
                    }
                    
                    textContainer.appendChild(p);
                }
                const lineaElemento = document.getElementById('linea-' + lineaActual);
                lineaElemento.innerHTML += mensajes[lineaActual].charAt(caracterActual);
                caracterActual++;
                if (caracterActual >= mensajes[lineaActual].length) {
                    caracterActual = 0; lineaActual++;
                    setTimeout(escribirTexto, 500); 
                } else {
                    setTimeout(escribirTexto, 45); 
                }
            }
        }
    </script>
</body>
</html>
