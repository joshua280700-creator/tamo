<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores para ti 🌻🤍</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdfaf3; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        #canvas-container {
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 2vh;
        }

        canvas {
            background-color: transparent;
        }

        #text-container {
            width: 85%;
            max-width: 650px;
            margin-top: 15px;
            text-align: left;
            min-height: 140px;
        }

        .line {
            margin-bottom: 8px;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        #timer-container {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
            width: 85%;
            max-width: 650px;
            padding-bottom: 20px;
        }
        
        #timer {
            color: #d2a679; 
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="treeCanvas"></canvas>
    </div>

    <div id="text-container"></div>

    <div id="timer-container">
        <div style="font-size: 0.85rem; font-weight: normal; margin-bottom: 5px; color: #777;">Mi amor por ti comenzó hace...</div>
        <span id="timer">Calculando tiempo juntos...</span>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN ---
        const fechaInicio = new Date("2023-05-03T00:00:00"); 
        
        const mensajes = [
            "Flores para el amor de mi vida, mi futura psicóloga favorita:",
            " ",
            "Girasoles por tu luz, y tulipanes blancos por la paz que me das.",
            "Si pudiera elegir un lugar seguro, sería siempre a tu lado.",
            "Cuanto más tiempo estoy contigo, más te amo.",
            " ",
            "¡Feliz aniversario! ✨🤍"
        ];

        // --- 2. PREPARACIÓN DEL LIENZO ---
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 500; 

        // --- 3. CARGA DE IMÁGENES ---
        let imagenesCargadas = 0;
        const totalImagenes = 2;

        const imgGirasol = new Image();
        imgGirasol.src = 'girasol.png'; 
        
        const imgTulipan = new Image();
        imgTulipan.src = 'tulipan_blanco.png'; 

        function iniciarCuandoTodoCargue() {
            imagenesCargadas++;
            if (imagenesCargadas === totalImagenes) {
                setTimeout(startSequence, 500); 
            }
        }

        imgGirasol.onload = iniciarCuandoTodoCargue;
        imgTulipan.onload = iniciarCuandoTodoCargue;

        // --- 4. SECUENCIA DE ANIMACIÓN ---
        function startSequence() {
            dibujarCesped(); 
            actualizarTemporizador(); 
            setInterval(actualizarTemporizador, 1000);
            
            setTimeout(() => {
                dibujarRama(canvas.width / 2, canvas.height - 20, 95, 0, 10);
            }, 300);

            setTimeout(escribirTexto, 3500); 
        }

        // --- 5. FUNCIONES DE DIBUJO ---
        function dibujarCesped() {
            const numeroTulipanes = 45; 
            const alturaSuelo = canvas.height - 20;
            // Ajustamos las proporciones para el nuevo tulipán
            const anchoImagen = 22; 
            const altoImagen = 40;

            for (let i = 0; i < numeroTulipanes; i++) {
                const x = Math.random() * (canvas.width + 40) - 20; 
                const y = alturaSuelo - altoImagen + (Math.random() * 20);
                const escala = 0.8 + Math.random() * 0.3;
                const anguloRad = (Math.random() - 0.5) * 15 * Math.PI / 180;

                ctx.save();
                ctx.translate(x + (anchoImagen*escala)/2, y + (altoImagen*escala)/2);
                ctx.rotate(anguloRad);
                ctx.drawImage(
                    imgTulipan, 
                    -(anchoImagen*escala)/2, 
                    -(altoImagen*escala)/2, 
                    anchoImagen * escala, 
                    altoImagen * escala
                );
                ctx.restore();
            }
        }

        function dibujarRama(startX, startY, len, angle, branchWidth) {
            const endX = startX + len * Math.sin(angle * Math.PI / 180);
            const endY = startY - len * Math.cos(angle * Math.PI / 180);

            ctx.beginPath();
            ctx.strokeStyle = '#6f4e37'; 
            ctx.lineWidth = branchWidth;
            ctx.lineCap = "round";
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            if (len < 12) {
                // Ajustamos el tamaño para el nuevo girasol
                const tamañoGirasol = 35; 
                let escalaActual = 0;
                const escalaFinal = 1;
                const velocidadCrecimiento = 0.05;

                function animarFlor() {
                    if (escalaActual < escalaFinal) {
                        ctx.save();
                        ctx.translate(endX, endY);
                        ctx.scale(escalaActual, escalaActual);
                        ctx.drawImage(
                            imgGirasol, 
                            -tamañoGirasol / 2, 
                            -tamañoGirasol / 2, 
                            tamañoGirasol, 
                            tamañoGirasol
                        );
                        ctx.restore();
                        
                        escalaActual += velocidadCrecimiento;
                        requestAnimationFrame(animarFlor);
                    }
                }
                animarFlor();
                return;
            }

            setTimeout(() => {
                dibujarRama(endX, endY, len * 0.76, angle + 22, branchWidth * 0.65);
                dibujarRama(endX, endY, len * 0.76, angle - 22, branchWidth * 0.65);
            }, 140);
        }

        // --- 6. CRONÓMETRO Y TEXTO ---
        function actualizarTemporizador() {
            const ahora = new Date();
            const diferencia = ahora - fechaInicio;
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
            document.getElementById("timer").innerText = `${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos`;
        }

        const textContainer = document.getElementById('text-container');
        let lineaActual = 0; caracterActual = 0;

        function escribirTexto() {
            if (lineaActual < mensajes.length) {
                if (caracterActual === 0) {
                    const p = document.createElement('div');
                    p.className = 'line';
                    p.id = 'linea-' + lineaActual;
                    textContainer.appendChild(p);
                }
                const lineaElemento = document.getElementById('linea-' + lineaActual);
                lineaElemento.innerHTML += mensajes[lineaActual].charAt(caracterActual);
                caracterActual++;
                if (caracterActual >= mensajes[lineaActual].length) {
                    caracterActual = 0; lineaActual++;
                    setTimeout(escribirTexto, 500); 
                } else {
                    setTimeout(escribirTexto, 45); 
                }
            }
        }
    </script>
</body>
</html>
